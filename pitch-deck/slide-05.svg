<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#0A0A0A"/>
  <text x="120" y="120" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#C9A96E">Edge in Action</text>
  <text x="120" y="170" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="#A0A0A0">Data no one sees → Trades no one makes</text>
  <!-- Trade 1 -->
  <rect x="120" y="220" width="840" height="760" rx="12" fill="#111111" stroke="#1a1a1a"/>
  <text x="160" y="280" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#C9A96E">La Niña → NFL Fertilizers</text>
  <rect x="660" y="255" width="80" height="32" rx="16" fill="#C9A96E"/>
  <text x="700" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#0A0A0A">+30%</text>
  <text x="180" y="340" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="210" y="340" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">Monitored cool sea surface temps in Pacific</text>
  <text x="180" y="380" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="210" y="380" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">La Niña → strong monsoons → fertilizer demand ↑</text>
  <text x="180" y="420" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="210" y="420" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">Bought National Fertilizers (NFL) stock</text>
  <text x="180" y="460" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="210" y="460" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">NFL rose ~30% from June 2024 in 2 months</text>
  <!-- Image placeholder 1 -->
  <rect x="160" y="500" width="760" height="440" rx="8" fill="none" stroke="#333" stroke-dasharray="8,4"/>
  <text x="540" y="730" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#555">📷 La Niña / NFL trade screenshot</text>
  <!-- Trade 2 -->
  <rect x="1000" y="220" width="800" height="760" rx="12" fill="#111111" stroke="#1a1a1a"/>
  <text x="1040" y="280" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#C9A96E">Iran / Strait of Hormuz</text>
  <rect x="1520" y="255" width="80" height="32" rx="16" fill="#C9A96E"/>
  <text x="1560" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#0A0A0A">+75%</text>
  <text x="1060" y="340" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="1090" y="340" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">US struck Iran 06:15 UTC, Feb 28, 2026</text>
  <text x="1060" y="380" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="1090" y="380" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">Tracked AIS shipping + satellite data</text>
  <text x="1060" y="420" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="1090" y="420" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">Detected Hormuz closure 8 hours before media</text>
  <text x="1060" y="460" font-family="Inter, sans-serif" font-size="20" fill="#C9A96E">→</text>
  <text x="1090" y="460" font-family="Inter, sans-serif" font-size="20" fill="#FFFFFF">Polymarket: $100 → $175 (+75% alpha)</text>
  <!-- Image placeholder 2 -->
  <rect x="1040" y="500" width="720" height="440" rx="8" fill="none" stroke="#333" stroke-dasharray="8,4"/>
  <text x="1400" y="730" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#555">📷 Polymarket Hormuz trade screenshot</text>
  <text x="1880" y="1050" text-anchor="end" font-family="Inter, sans-serif" font-size="16" fill="#333">5</text>
</svg>
